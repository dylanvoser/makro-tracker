[build]
  functions = "netlify/functions"
  command = "npm install @supabase/supabase-js@2 && cp node_modules/@supabase/supabase-js/dist/umd/supabase.min.js supabase.min.js"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://api.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://api.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com;"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"
