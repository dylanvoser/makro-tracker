<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Rezept Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding:20px; max-width:800px; margin:auto; }
    input, button { padding:10px; width:100%; }
    .row { display:flex; gap:10px; margin-bottom:8px; }
  </style>
</head>
<body>

<h2>Rezept bearbeiten</h2>

<input id="name" placeholder="Name" />

<h3>Zutaten</h3>
<div id="zutaten-container"></div>

<div style="display:flex; gap:10px; margin-top:10px;">
  <button onclick="addTextZutat()">+ Text</button>
  <button onclick="addDatabaseZutat()">+ Zutat</button>
</div>

<h3>Makros</h3>
<input id="kalorien" placeholder="Kalorien" />
<input id="protein" placeholder="Protein" />
<input id="kohlenhydrate" placeholder="Kohlenhydrate" />
<input id="fett" placeholder="Fett" />

<script>
const supabaseClient = supabase.createClient("YOUR_URL", "YOUR_KEY");

let zutaten = [];

function renderZutaten() {
  const container = document.getElementById("zutaten-container");
  container.innerHTML = "";

  zutaten.forEach((zutat, index) => {
    const row = document.createElement("div");
    row.className = "row";

    const menge = document.createElement("input");
    menge.value = zutat.menge;
    menge.oninput = (e) => {
      zutat.menge = parseFloat(e.target.value) || 0;
      updateMakros();
    };

    const name = document.createElement("input");
    name.value = zutat.name;
    if (zutat.type === "db") name.disabled = true;
    name.oninput = (e) => zutat.name = e.target.value;

    const del = document.createElement("button");
    del.innerText = "🗑";
    del.onclick = () => {
      zutaten.splice(index, 1);
      renderZutaten();
      updateMakros();
    };

    row.appendChild(menge);
    row.appendChild(name);
    row.appendChild(del);

    container.appendChild(row);
  });
}

function addTextZutat() {
  zutaten.push({
    type: "text",
    name: "",
    menge: 0,
    kalorien: 0,
    protein: 0,
    carbs: 0,
    fett: 0
  });
  renderZutaten();
}

async function addDatabaseZutat() {
  const { data, error } = await supabaseClient.from("zutaten").select("*");
  if (error) return console.error(error);

  const name = prompt("Zutat wählen:\n" + data.map(d => d.name).join("\n"));
  const selected = data.find(d => d.name === name);
  if (!selected) return;

  zutaten.push({
    type: "db",
    name: selected.name,
    menge: 100,
    kalorien: selected.kalorien,
    protein: selected.protein,
    carbs: selected.kohlenhydrate,
    fett: selected.fett
  });

  renderZutaten();
  updateMakros();
}

function updateMakros() {
  let k=0,p=0,c=0,f=0;

  zutaten.forEach(z => {
    const faktor = z.menge / 100;
    k += (z.kalorien||0)*faktor;
    p += (z.protein||0)*faktor;
    c += (z.carbs||0)*faktor;
    f += (z.fett||0)*faktor;
  });

  document.getElementById("kalorien").value = Math.round(k);
  document.getElementById("protein").value = Math.round(p);
  document.getElementById("kohlenhydrate").value = Math.round(c);
  document.getElementById("fett").value = Math.round(f);
}
</script>

</body>
</html>
